<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>日程胶囊</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            background: transparent !important;
            font-family: -apple-system, 'Segoe UI', 'PingFang SC', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .capsule {
            width: 100vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.06);
            display: flex;
            flex-direction: column;
            padding: 20px 24px;
            -webkit-app-region: drag;
            user-select: none;
            position: relative;
            transition: background 0.3s ease;
        }
        .app-title {
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 2px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            -webkit-app-region: no-drag;
            flex-shrink: 0;
            color: inherit;
            text-shadow: 0 1px 6px rgba(0,0,0,0.1);
        }
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0 12px 0;
            -webkit-app-region: no-drag;
            flex-shrink: 0;
        }
        .update-time {
            font-size: 12px;
            font-weight: 600;
            opacity: 0.7;
            color: inherit;
            white-space: nowrap;
        }
        .top-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            -webkit-app-region: no-drag;
            flex-shrink: 0;
        }
        .top-actions button {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            color: inherit;
            padding: 0;
            -webkit-app-region: no-drag;
        }
        .top-actions button:hover {
            background: rgba(255,255,255,0.14);
        }
        .top-actions button svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* 主题预设 */
        .theme-dark .app-title,
        .theme-dark .event-title,
        .theme-dark .event-detail,
        .theme-dark .no-events,
        .theme-dark .more-indicator,
        .theme-dark .update-time {
            color: #fff;
        }
        .theme-dark .event-detail { color: rgba(255,255,255,0.6); }
        .theme-dark .more-indicator { color: rgba(255,255,255,0.35); }
        .theme-dark .top-actions button { color: #fff; }
        .theme-dark .event-item {
            background: rgba(255, 255, 255, 0.22);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .theme-dark .loc-icon { stroke: rgba(255,255,255,0.6); }
        .theme-dark .calendar-tag { color: rgba(255,255,255,0.6); }

        .theme-light .app-title,
        .theme-light .event-title,
        .theme-light .event-detail,
        .theme-light .no-events,
        .theme-light .more-indicator,
        .theme-light .update-time {
            color: #1a1a2e;
        }
        .theme-light .event-detail { color: rgba(0,0,0,0.6); }
        .theme-light .more-indicator { color: rgba(0,0,0,0.3); }
        .theme-light .top-actions button {
            color: #1a1a2e;
            background: rgba(0,0,0,0.04);
            border-color: rgba(0,0,0,0.06);
        }
        .theme-light .top-actions button:hover {
            background: rgba(0,0,0,0.08);
        }
        .theme-light .event-item {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }
        .theme-light .loc-icon { stroke: rgba(0,0,0,0.6); }
        .theme-light .calendar-tag { color: rgba(0,0,0,0.5); }

        .theme-warm .app-title,
        .theme-warm .event-title,
        .theme-warm .event-detail,
        .theme-warm .no-events,
        .theme-warm .more-indicator,
        .theme-warm .update-time {
            color: #3e2c1b;
        }
        .theme-warm .event-detail { color: rgba(62,44,27,0.6); }
        .theme-warm .more-indicator { color: rgba(62,44,27,0.3); }
        .theme-warm .top-actions button {
            color: #3e2c1b;
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.1);
        }
        .theme-warm .event-item {
            background: rgba(255, 235, 200, 0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .theme-warm .calendar-tag { color: rgba(62,44,27,0.6); }
        .theme-warm .loc-icon { stroke: rgba(62,44,27,0.6); }

        .theme-cool .app-title,
        .theme-cool .event-title,
        .theme-cool .event-detail,
        .theme-cool .no-events,
        .theme-cool .more-indicator,
        .theme-cool .update-time {
            color: #0b2b3a;
        }
        .theme-cool .event-detail { color: rgba(11,43,58,0.6); }
        .theme-cool .more-indicator { color: rgba(11,43,58,0.3); }
        .theme-cool .top-actions button {
            color: #0b2b3a;
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.1);
        }
        .theme-cool .event-item {
            background: rgba(200, 230, 240, 0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .theme-cool .calendar-tag { color: rgba(11,43,58,0.6); }
        .theme-cool .loc-icon { stroke: rgba(11,43,58,0.6); }

        .loc-icon {
            display: inline-block;
            vertical-align: middle;
            width: 12px;
            height: 12px;
            margin-right: 2px;
            flex-shrink: 0;
        }

        .content {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            align-content: start;
            -webkit-app-region: no-drag;
            overflow: hidden;
            padding-top: 12px;
        }

        .event-item {
            display: flex;
            align-items: center;
            padding: 8px 14px 8px 16px;
            border-radius: 16px;
            gap: 12px;
            min-width: 0;
            overflow: hidden;
            transition: background 0.2s;
            position: relative;
            height: 50px;
            width: 100%;
        }
        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: opacity 0.3s;
        }
        .color-dot.breathing {
            animation: breathe 1.6s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0); }
            50% { opacity: 0.2; transform: scale(0.75); box-shadow: 0 0 12px 4px rgba(255,255,255,0.3); }
        }

        .event-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
            overflow: hidden;
            text-align: left;
        }
        .event-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: 8px;
        }
        .event-title {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 1px 4px rgba(0,0,0,0.05);
            line-height: 1.4;
            flex: 1;
            min-width: 0;
        }
        .calendar-tag {
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0.7;
            flex-shrink: 0;
            margin-right: 4px;
        }
        .event-detail {
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            line-height: 1.3;
        }
        .event-detail .loc-icon {
            vertical-align: middle;
        }
        .event-bar {
            width: 4px;
            height: 100%;
            border-radius: 4px;
            flex-shrink: 0;
            margin-left: 8px;
        }

        .no-events,
        .more-indicator {
            grid-column: 1 / -1;
            text-align: center;
        }
        .no-events {
            font-size: 18px;
            line-height: 2;
            padding: 20px 0;
        }
        .more-indicator {
            font-size: 13px;
            margin-top: 4px;
            opacity: 0.7;
            grid-column: 1 / -1;
        }
        .error { color: #ff6b6b !important; }
        .loading { opacity: 0.6; }
    </style>
</head>
<body>
    <div class="capsule" id="capsule">
        <div class="app-title">Calendar for iOS</div>
        <div class="toolbar">
            <span class="update-time" id="updateTime">最后刷新时间：--</span>
            <div class="top-actions">
                <button id="refreshBtn" title="刷新数据">
                    <svg viewBox="0 0 24 24">
                        <path d="M23 4v6h-6" />
                        <path d="M1 20v-6h6" />
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
                    </svg>
                </button>
                <button id="addLinkBtn" title="添加链接">
                    <svg viewBox="0 0 24 24">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                </button>
                <button id="minimizeBtn" title="最小化">
                    <svg viewBox="0 0 24 24">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
                <button id="themeToggle" title="切换主题">
                    <svg viewBox="0 0 24 24" id="themeIcon">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="content" id="content">
            <div class="no-events" id="displayArea">⏳ 加载中...</div>
        </div>
    </div>

    <script>
        console.log('🚀 capsule.html loaded');
        if (typeof window.electronAPI === 'undefined') {
            document.getElementById('displayArea').innerHTML = 
                '<div class="no-events error">⚠️ 应用初始化失败，请重启</div>';
            throw new Error('electronAPI not available');
        }

        const capsule = document.getElementById('capsule');
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const refreshBtn = document.getElementById('refreshBtn');
        const addLinkBtn = document.getElementById('addLinkBtn');
        const minimizeBtn = document.getElementById('minimizeBtn');
        const updateTimeEl = document.getElementById('updateTime');
        const contentEl = document.getElementById('content');

        let currentTheme = 'dark';
        let currentOpacity = 0.08;
        let lastUpdateTime = null;
        let allEvents = [];

        // ---------- 应用主题 ----------
        function applyTheme(theme) {
            if (!theme) theme = 'dark';
            currentTheme = theme;
            capsule.classList.remove('theme-dark', 'theme-light', 'theme-warm', 'theme-cool');
            capsule.classList.add(`theme-${theme}`);
            if (theme === 'light') {
                themeIcon.innerHTML = `
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                `;
            } else {
                themeIcon.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
            }
            applyOpacity(currentOpacity);
        }

        // ---------- 应用透明度 ----------
        function applyOpacity(opacity) {
            currentOpacity = Math.min(1, Math.max(0, opacity));
            let baseColor = '255,255,255';
            if (capsule.classList.contains('theme-warm')) baseColor = '245,222,179';
            else if (capsule.classList.contains('theme-cool')) baseColor = '173,216,230';
            capsule.style.background = `rgba(${baseColor}, ${currentOpacity})`;
        }

        // 监听类变化以更新背景色
        const observer = new MutationObserver(() => {
            applyOpacity(currentOpacity);
        });
        observer.observe(capsule, { attributes: true, attributeFilter: ['class'] });

        // ---------- 切换主题 ----------
        function toggleTheme() {
            const themes = ['dark', 'light', 'warm', 'cool'];
            const idx = themes.indexOf(currentTheme);
            const next = themes[(idx + 1) % themes.length];
            applyTheme(next);
            if (window.electronAPI && window.electronAPI.setCapsuleTheme) {
                window.electronAPI.setCapsuleTheme(next);
            }
        }

        themeToggle.addEventListener('click', toggleTheme);

        if (window.electronAPI && window.electronAPI.onCapsuleThemeChanged) {
            window.electronAPI.onCapsuleThemeChanged((event, theme) => {
                applyTheme(theme);
                applyOpacity(currentOpacity);
            });
        }
        if (window.electronAPI && window.electronAPI.onCapsuleOpacityChanged) {
            window.electronAPI.onCapsuleOpacityChanged((event, opacity) => {
                applyOpacity(opacity);
            });
        }

        // ---------- 更新时间 ----------
        function formatUpdateTime(ts) {
            if (!ts) return '--';
            const d = new Date(ts);
            const month = d.getMonth() + 1;
            const day = d.getDate();
            const weekdays = ['日','一','二','三','四','五','六'];
            const wd = weekdays[d.getDay()];
            const hours = String(d.getHours()).padStart(2,'0');
            const mins = String(d.getMinutes()).padStart(2,'0');
            return `${month}月${day}日 周${wd} ${hours}:${mins}`;
        }

        function setUpdateTime(ts) {
            lastUpdateTime = ts;
            updateTimeEl.textContent = '最后刷新时间：' + formatUpdateTime(ts);
        }

        // ---------- 工具函数 ----------
        function fmtDate(d) {
            const dt = new Date(d);
            const weekdays = ['日','一','二','三','四','五','六'];
            const month = dt.getMonth() + 1;
            const day = dt.getDate();
            const wd = weekdays[dt.getDay()];
            const hours = String(dt.getHours()).padStart(2,'0');
            const mins = String(dt.getMinutes()).padStart(2,'0');
            return `${month}月${day}日 周${wd} ${hours}:${mins}`;
        }

        function fmtTime(d) {
            const dt = new Date(d);
            const hours = String(dt.getHours()).padStart(2,'0');
            const mins = String(dt.getMinutes()).padStart(2,'0');
            return `${hours}:${mins}`;
        }

        function isWithinHour(date) {
            const now = new Date();
            const diff = date.getTime() - now.getTime();
            return diff > 0 && diff <= 3600000;
        }

        function getMaxRows() {
            const contentHeight = contentEl.clientHeight;
            const cardHeight = 50;
            const gap = 16;
            let rows = Math.floor((contentHeight + gap) / (cardHeight + gap));
            if (rows < 3) rows = 3;
            return rows;
        }

        // ---------- 渲染日程 ----------
        function renderEvents(events, updateTs) {
            allEvents = events || [];
            if (updateTs) setUpdateTime(updateTs);
            
            if (!allEvents || allEvents.length === 0) {
                contentEl.innerHTML = `<div class="no-events">🎉 暂无日程<br><span style="font-size:15px;opacity:0.5;">今天没有安排</span></div>`;
                return;
            }

            const maxRows = getMaxRows();
            const maxItems = maxRows * 2;
            const showCount = Math.min(allEvents.length, maxItems);
            const hasMore = allEvents.length > showCount;

            let html = '';
            for (let i = 0; i < showCount; i++) {
                const ev = allEvents[i];
                const isSoon = isWithinHour(ev.start);
                let detail = fmtDate(ev.start);
                if (ev.end) detail += ' - ' + fmtTime(ev.end);
                let locationHtml = '';
                if (ev.location) {
                    locationHtml = `
                        <svg class="loc-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                            <circle cx="12" cy="10" r="3"/>
                        </svg> ${ev.location}
                    `;
                }
                const detailHtml = detail + (locationHtml ? ' ' + locationHtml : '');
                const color = ev.color || '#4facfe';
                const calendarName = ev.calendarName || '';
                const breathingClass = isSoon ? 'breathing' : '';
                html += `
                    <div class="event-item">
                        <div class="color-dot ${breathingClass}" style="background:${color};"></div>
                        <div class="event-info">
                            <div class="event-title-row">
                                <div class="event-title">${ev.summary || '无标题'}</div>
                                ${calendarName ? `<span class="calendar-tag">${calendarName}</span>` : ''}
                            </div>
                            <div class="event-detail">${detailHtml}</div>
                        </div>
                        <div class="event-bar" style="background:${color};"></div>
                    </div>
                `;
            }
            if (hasMore) {
                html += `<div class="more-indicator">还有 ${allEvents.length - showCount} 个日程 ...</div>`;
            }
            contentEl.innerHTML = html;
        }

        function renderError(message) {
            contentEl.innerHTML = `<div class="no-events error">⚠️ ${message}</div>`;
        }

        function renderLoading() {
            contentEl.innerHTML = `<div class="no-events loading">⏳ 加载中...</div>`;
        }

        // ---------- 更新数据 ----------
        async function update() {
            console.log('🔄 update() called');
            try {
                if (!window.electronAPI || !window.electronAPI.getCalendarData) {
                    renderError('API 未初始化，请重启应用');
                    return;
                }
                const result = await window.electronAPI.getCalendarData();
                if (result?.error) {
                    renderError(result.error);
                } else {
                    if (result.theme) applyTheme(result.theme);
                    if (typeof result.opacity === 'number') applyOpacity(result.opacity);
                    const events = result?.events || [];
                    renderEvents(events, Date.now());
                }
            } catch(e) {
                console.error('❌ update error:', e);
                renderError('读取失败: ' + e.message);
            }
        }

        // ---------- 手动刷新 ----------
        function manualRefresh() {
            if (window.electronAPI && window.electronAPI.refreshCache) {
                renderLoading();
                window.electronAPI.refreshCache();
            } else {
                update();
            }
        }

        if (window.electronAPI && window.electronAPI.onRefresh) {
            window.electronAPI.onRefresh(() => {
                update();
            });
        }

        refreshBtn.addEventListener('click', manualRefresh);
        addLinkBtn.addEventListener('click', () => {
            if (window.electronAPI && window.electronAPI.openManageLinks) {
                window.electronAPI.openManageLinks();
            }
        });
        minimizeBtn.addEventListener('click', () => {
            if (window.electronAPI && window.electronAPI.minimizeWindow) {
                window.electronAPI.minimizeWindow();
            }
        });

        // ---------- 窗口尺寸变化 ----------
        function onResize() {
            if (allEvents && allEvents.length > 0) {
                renderEvents(allEvents, lastUpdateTime);
            }
        }

        let resizeObserver = null;
        function observeResize() {
            if (resizeObserver) resizeObserver.disconnect();
            resizeObserver = new ResizeObserver(() => {
                onResize();
            });
            resizeObserver.observe(contentEl);
        }

        // ---------- 初始化 ----------
        renderLoading();
        update();
        observeResize();
        window.addEventListener('resize', () => {
            setTimeout(onResize, 50);
        });

        document.addEventListener('visibilitychange', () => {
            capsule.style.opacity = document.hidden ? '0.7' : '1';
        });
    </script>
</body>
</html>
